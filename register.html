<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Register | Clock Repair Workshop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ----- BODY WITH RICH BACKGROUND IMAGE (CLOCK REPAIR ATMOSPHERE) ----- */
        body {
            /* Fallback warm dark tone */
            background-color: #1e1915;
            /* High-quality background image: antique clockmaker's bench with tools and gears */
            background-image: linear-gradient(135deg, rgba(10, 8, 6, 0.75), rgba(25, 18, 12, 0.85)), 
                              url('https://images.unsplash.com/photo-1509130298739-6518013dc359?q=80&w=2070&auto=format');
            background-size: cover;
            background-position: center 30%;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            font-family: 'Segoe UI', system-ui, 'Inter', -apple-system, 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* elegant card: clean white with golden accents */
        .card {
            max-width: 440px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(212, 175, 55, 0.3);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.3s;
            backdrop-filter: blur(0px);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 32px 48px -15px rgba(0, 0, 0, 0.7);
        }

        /* header with dark & gold harmony */
        .header {
            background: #1c1a16;
            padding: 1.4rem 1.5rem;
            text-align: center;
            border-bottom: 3px solid #d4af37;
        }

        .header h2 {
            color: #f9f3e2;
            font-weight: 600;
            font-size: 1.55rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header h2 i {
            color: #d4af37;
            font-size: 1.5rem;
        }

        .header p {
            font-size: 0.7rem;
            color: #c0b28a;
            margin-top: 5px;
            letter-spacing: 0.3px;
        }

        /* form body spacing */
        .form-body {
            padding: 1.8rem 1.8rem 2rem;
        }

        .input-field {
            margin-bottom: 1.2rem;
        }

        .input-field label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #4a3b28;
            margin-bottom: 0.45rem;
        }

        .input-field label i {
            color: #d4af37;
            width: 18px;
        }

        .input-field input {
            width: 100%;
            padding: 11px 16px;
            border: 1px solid #e2dbcf;
            border-radius: 48px;
            font-size: 0.85rem;
            background-color: #fefcf8;
            outline: none;
            transition: all 0.2s;
        }

        .input-field input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
            background-color: #ffffff;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 40px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            color: #9c8b76;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            color: #d4af37;
        }

        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1rem 0 1.3rem;
        }

        .terms input {
            width: 17px;
            height: 17px;
            accent-color: #d4af37;
            cursor: pointer;
        }

        .terms label {
            font-size: 0.72rem;
            color: #3c2e1f;
            font-weight: 500;
        }

        .terms a {
            color: #b47c2e;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dotted rgba(180, 124, 46, 0.4);
        }

        .terms a:hover {
            color: #9b6a24;
        }

        .btn {
            width: 100%;
            background: #1c1a16;
            border: none;
            border-radius: 48px;
            padding: 12px;
            color: #faf3e0;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn i {
            color: #d4af37;
        }

        .btn:hover {
            background: #2b2722;
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.3rem;
            color: #6b5a45;
        }

        .login-link a {
            color: #b8860b;
            text-decoration: none;
            font-weight: 700;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error {
            font-size: 0.65rem;
            color: #c45c2c;
            margin-top: 5px;
            margin-left: 14px;
            font-weight: 500;
        }

        .toast {
            background: #2b2a26;
            color: #f7e9ce;
            padding: 10px 16px;
            border-radius: 60px;
            font-size: 0.75rem;
            margin-bottom: 1rem;
            text-align: center;
            border-left: 4px solid #d4af37;
            font-weight: 500;
            animation: fadeSlide 0.25s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            .form-body {
                padding: 1.4rem 1.2rem 1.8rem;
            }
            .btn {
                padding: 10px;
            }
        }
        .logo{
            justify-content: center;
        }
    </style>
  <link rel="stylesheet" href="./shared.css">
    <link rel="icon" type="image/png" href="./favicon.png">
</head>
<body>



    

    <script src="./nav.js"></script>
    <!-- Navbar Wrapper -->
    <div class="nav-wrapper">
      <div class="container">
        <nav>
          <a href="./index.html" class="logo">
            <i class="fas fa-hourglass-half logo-icon"></i>
            <span class="logo-name">Antique Clock</span>
          </a>
          
          <div class="nav-actions">
            <button class="icon-btn" id="darkToggle" aria-label="Dark mode"><i class="fa-solid fa-moon"></i></button>
            <button class="icon-btn" id="rtlToggle" aria-label="RTL mode"><i class="fa-solid fa-right-left"></i></button>
           
          </div>
        </nav>
      </div>
    </div>

    <!-- Drawer overlay & drawer panel -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="drawer">
      <div class="drawer-header">
        <a href="./index.html" class="drawer-logo" data-close><i class="fas fa-hourglass-half"></i><span>Antique Clock</span></a>
        <button class="drawer-close" id="closeDrawer"><i class="fas fa-times"></i></button>
      </div>
      <div class="drawer-nav">
        <div class="drawer-section-label">Navigation</div>
        <a href="javascript:void(0)" data-close><i class="fas fa-home"></i> Home</a>

      </div>

<div class="card">
    <div class="header">
        <a href="./index.html" class="logo">
            <i class="fas fa-hourglass-half logo-icon"></i>
            <span class="logo-name">Antique Clock</span>
        </a>
        <p>antique horology · artisan registry</p>
    </div>
    <div class="form-body">
        <div id="msgArea"></div>
        <form id="shortForm" novalidate>
            <div class="input-field">
                <label><i class="fas fa-user"></i> Full name</label>
                <input type="text" id="name" placeholder="Horatio Wells" autocomplete="name">
                <div class="error" id="nameError"></div>
            </div>
            <div class="input-field">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" placeholder="repair@antique.com">
                <div class="error" id="emailError"></div>
            </div>
            <div class="input-field">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="min. 6 characters">
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
                <div class="error" id="pwdError"></div>
            </div>
            <div class="input-field">
                <label><i class="fas fa-lock"></i> Confirm password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="repeat password">
                    <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
                </div>
            </div>
            <button type="submit" class="btn"><i class="fas fa-user-plus"></i> Create Account</button>
            <div class="login-link">Already a member? <a href="login.html">Sign in</a></div>
        </form>
    </div>
</div>

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="./nav.js"></script>

<script>
    (function() {
        const form = document.getElementById('shortForm');
        const msgDiv = document.getElementById('msgArea');

        function showMsg(text, isErr = false) {
            msgDiv.innerHTML = `<div class="toast" style="${isErr ? 'background:#3a261e; border-left-color:#d97a3c;' : 'background:#1e2b1c; border-left-color:#d4af37;'}">${isErr ? '⚠️ ' : '✓ '}${text}</div>`;
            setTimeout(() => {
                if (msgDiv.firstChild) msgDiv.innerHTML = '';
            }, 3800);
        }

        function setErr(id, msg) {
            const errSpan = document.getElementById(id);
            if (errSpan) errSpan.innerText = msg || '';
        }

        function resetErrors() {
            setErr('nameError', '');
            setErr('emailError', '');
            setErr('pwdError', '');
        }

        // live clear errors on input
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const pwdInput = document.getElementById('password');
        if (nameInput) nameInput.addEventListener('input', () => setErr('nameError', ''));
        if (emailInput) emailInput.addEventListener('input', () => setErr('emailError', ''));
        if (pwdInput) pwdInput.addEventListener('input', () => setErr('pwdError', ''));

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let valid = true;
            resetErrors();

            const name = document.getElementById('name').value.trim();
            if (!name) {
                setErr('nameError', 'Full name is required');
                valid = false;
            } else if (name.length < 2) {
                setErr('nameError', 'Please enter a valid name');
                valid = false;
            }

            const email = document.getElementById('email').value.trim();
            const emailRegex = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/i;
            if (!email) {
                setErr('emailError', 'Email address is required');
                valid = false;
            } else if (!emailRegex.test(email)) {
                setErr('emailError', 'Valid email required (e.g., name@domain.com)');
                valid = false;
            }

            const pwd = document.getElementById('password').value;
            if (!pwd) {
                setErr('pwdError', 'Password cannot be empty');
                valid = false;
            } else if (pwd.length < 6) {
                setErr('pwdError', 'Password must be at least 6 characters');
                valid = false;
            }

            const termsOk = document.getElementById('terms').checked;
            if (!termsOk) {
                showMsg('Please accept the Terms & Privacy Policy to continue', true);
                valid = false;
            }

            if (valid) {
                showMsg(`Welcome ${name}! Registration complete. A confirmation will be sent to ${email}.`, false);
                form.reset();
                document.getElementById('terms').checked = false;
                resetErrors();
            }
        });
    })();
</script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        function setupToggle(toggleId, inputId) {
            const toggleIcon = document.getElementById(toggleId);
            const inputField = document.getElementById(inputId);
            if (toggleIcon && inputField) {
                toggleIcon.addEventListener("click", function () {
                    const type = inputField.getAttribute("type") === "password" ? "text" : "password";
                    inputField.setAttribute("type", type);
                    this.classList.toggle("fa-eye");
                    this.classList.toggle("fa-eye-slash");
                });
            }
        }
        setupToggle("togglePassword", "password");
        setupToggle("toggleConfirmPassword", "confirmPassword");
    });
</script>
